<style>
.qa-wrap { padding: 1rem 0; font-size: 15px; }
.qa-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
.qa-badge { background: linear-gradient(135deg, #833AB4, #C13584, #E1306C); color: #fff; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.04em; }
.qa-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
.qa-meta { font-size: 13px; color: var(--color-text-secondary); }
.prog-bar { background: var(--color-border-tertiary); border-radius: 99px; height: 5px; margin-bottom: 1.5rem; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #833AB4, #E1306C); border-radius: 99px; transition: width 0.3s ease; }
.q-num { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
.q-text { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1.25rem; line-height: 1.5; }
.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
.opt { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; background: var(--color-background-primary); transition: background 0.15s, border-color 0.15s; }
.opt:hover:not(.locked) { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
.opt-letter { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--color-border-primary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; color: var(--color-text-secondary); margin-top: 1px; }
.opt-text { font-size: 14px; color: var(--color-text-primary); line-height: 1.45; }
.opt.correct { background: var(--color-background-success); border-color: var(--color-border-success); }
.opt.correct .opt-letter { background: var(--color-text-success); border-color: var(--color-text-success); color: #fff; }
.opt.wrong { background: var(--color-background-danger); border-color: var(--color-border-danger); }
.opt.wrong .opt-letter { background: var(--color-text-danger); border-color: var(--color-text-danger); color: #fff; }
.opt.dimmed { opacity: 0.45; }
.feedback { padding: 10px 14px; border-radius: var(--border-radius-md); font-size: 13px; line-height: 1.55; margin-bottom: 1rem; display: none; }
.feedback.show { display: block; }
.feedback.ok { background: var(--color-background-success); color: var(--color-text-success); border: 0.5px solid var(--color-border-success); }
.feedback.bad { background: var(--color-background-danger); color: var(--color-text-danger); border: 0.5px solid var(--color-border-danger); }
.qa-btn { padding: 9px 20px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--color-text-primary); display: inline-flex; align-items: center; gap: 6px; }
.qa-btn:hover { background: var(--color-background-secondary); }
.qa-btn.primary { background: #833AB4; color: #fff; border-color: #833AB4; }
.qa-btn.primary:hover { background: #6b2f94; border-color: #6b2f94; }
.score-wrap { text-align: center; padding: 1.5rem 0; }
.score-circle { width: 96px; height: 96px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1rem; border: 3px solid #ccc; }
.score-circle.pass { border-color: var(--color-text-success); }
.score-circle.fail { border-color: var(--color-text-danger); }
.score-num { font-size: 26px; font-weight: 500; }
.score-denom { font-size: 13px; color: var(--color-text-secondary); }
.score-label { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
.score-sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.review-list { text-align: left; display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }
.rev-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; padding: 8px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); }
.rev-item.rpass { background: var(--color-background-success); border-color: var(--color-border-success); color: var(--color-text-success); }
.rev-item.rfail { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
.rev-icon { flex-shrink: 0; margin-top: 1px; }
</style>

<div class="qa-wrap">
  <div class="qa-header">
    <span class="qa-badge">INSTAGRAM MODULE</span>
    <div>
      <div class="qa-title">Outreach Standards — Knowledge Assessment</div>
      <div class="qa-meta">15 questions &nbsp;·&nbsp; 70% to pass (11/15)</div>
    </div>
  </div>

  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div id="quiz-area"></div>
</div>

<script>
const Qs = [
  { q: "What is the maximum word count for an Instagram DM?",
    opts: ["150 words","250 words","100 words","75 words"],
    ans: 2,
    fb: "Instagram DMs must be between 40 and 100 words — the tightest limit across all three channels. Instagram users don't read walls of text. Every word must earn its place." },

  { q: "What is the daily Instagram DM target per shift?",
    opts: ["20–30 DMs","5–8 DMs","10–15 DMs","15–20 DMs"],
    ans: 2,
    fb: "The target is 10–15 DMs per shift, the same as Facebook. Instagram is quality-first — you are writing a brand-to-brand message, not a volume blast." },

  { q: "What must the opening of every Instagram DM include?",
    opts: ["A formal greeting and your full name","A reference to their brand — handle, niche, or visual content style","A link to TGS BPO's service page","A question about their current marketing budget"],
    ans: 1,
    fb: "The opening must reference their brand — their handle, their niche, or something specific about their visual content or feed. Generic openers are an immediate QA failure on Instagram because it is fundamentally a brand-to-brand channel." },

  { q: "How much time should you spend researching a prospect's profile BEFORE writing their DM?",
    opts: ["No research needed — personalise after they reply","30 seconds is enough","90 seconds — checking their feed, bio, and recent posts","5 minutes — read every caption and comment"],
    ans: 2,
    fb: "The 90-second profile check is built into the Instagram process. In those 90 seconds you check their bio, their most recent 3–4 posts, and any business indicators (link in bio, product tags, story highlights). If you skip this, your DM won't be personalised enough to pass QA." },

  { q: "Which of the following correctly describes the 3-part Instagram DM formula?",
    opts: ["Subject line → services list → book a call link","Brand reference → 1–2 benefit sentences → soft reply CTA","Formal greeting → pain point → free consultation offer","Introduction → case study → pricing table"],
    ans: 1,
    fb: "Every Instagram DM follows: (1) Brand reference — name their handle, niche, or content, (2) 1–2 sentences connecting a benefit to their situation, (3) One soft CTA — a reply-based question with no links." },

  { q: "Compared to Email and Facebook, how does Instagram rank in terms of message length?",
    opts: ["Longest — Instagram users prefer detailed messages","Same length as Facebook","Shortest — Instagram is the most concise of the three channels","Middle — shorter than email but longer than Facebook"],
    ans: 2,
    fb: "Instagram is the shortest and most visual channel of the three. Email allows up to 250 words; Facebook allows 50–150; Instagram caps at 40–100. The platform itself conditions users to short, punchy communication." },

  { q: "What is the follow-up rule for Instagram outreach?",
    opts: ["Follow up every 3 days until they reply","Day 0 initial DM + Day 5 follow-up only. Maximum 2 messages total","Send up to 4 messages — Day 0, 3, 7, and 14","No follow-ups — if they don't reply to the first DM, move on"],
    ans: 1,
    fb: "Instagram shares the same follow-up limit as Facebook: two messages maximum. Day 0 is your initial DM; Day 5 is your one permitted follow-up. A third message is a QA auto-fail and considered harassment." },

  { q: "Which of the following is PROHIBITED on Instagram outreach?",
    opts: ["Mentioning the prospect's handle in your opening line","Using automation tools or mass-DM bots","Referencing their most recent post","Asking a reply-based question as your CTA"],
    ans: 1,
    fb: "Automation tools and mass-DM bots are prohibited — no exceptions, regardless of what tools are advertised online. Instagram's algorithm detects and penalises automated DM activity, and it violates TGS BPO's QA standards." },

  { q: "A prospect hasn't replied to your Instagram DM. It's now Day 6. What should you do?",
    opts: ["Send a second follow-up explaining the benefits again","DM them on Facebook as a backup channel","Your outreach window has closed — no further messages, update Asana to 'No Response'","Wait until Day 10, then send a final check-in"],
    ans: 2,
    fb: "Day 5 was your last permitted follow-up. Day 6 means your window has closed. Update Asana to 'No Response' and do not contact them again. Cross-channel outreach also requires TL approval — you cannot simply switch to Facebook without checking first." },

  { q: "What percentage of your QA score comes from Message Quality and Personalization?",
    opts: ["10%","15%","25%","35%"],
    ans: 2,
    fb: "Message Quality and Personalization is worth 25% of your total QA score on Instagram — the highest single-category weight. Instagram's brand-to-brand nature makes generic messaging particularly damaging to your score." },

  { q: "Which of the following is a RED FLAG that should stop you from DMing an Instagram account?",
    opts: ["Their bio mentions 'founder' or 'owner'","Their account is set to private with no visible posts or business activity","They have fewer than 1,000 followers","Their last post was 4 days ago"],
    ans: 1,
    fb: "A fully private account means you cannot verify any business activity, niche, or content — making meaningful personalisation impossible. This is a skip. A 90-second profile check should give you enough to qualify or disqualify them without ever sending a DM." },

  { q: "What should you do immediately after sending an Instagram DM?",
    opts: ["Like three of their recent posts to stay visible","Send a connection request to reinforce the outreach","Log it in Asana: status 'Contacted', group/source, post topic, DM date, Day 5 follow-up reminder set","Wait 24 hours and check if they've read the message before logging anything"],
    ans: 2,
    fb: "Asana logging is mandatory and must happen immediately after sending. If the DM isn't logged, it's treated as if it was never sent during QA review. Log the source, the personalisation hook you used, the date, and set your Day 5 reminder." },

  { q: "Your Instagram CTA says: 'Check out how we've helped similar brands at www.tgsbpo.com — book a free call!' — what is wrong with this?",
    opts: ["Nothing — links increase response rates on Instagram","It contains a link and multiple asks, both of which violate Instagram outreach standards","The tone is too casual for a business prospect","It should mention the prospect's follower count"],
    ans: 1,
    fb: "Two violations in one CTA: (1) a URL drop — links in DMs are the most common Instagram QA failure, and Instagram suppresses messages with links in some cases, and (2) multiple asks (visit a website AND book a call). Your CTA must be one soft reply-based question, nothing else." },

  { q: "A prospect replies to your Instagram DM expressing interest. They're also active on LinkedIn. What do you do?",
    opts: ["Immediately connect on LinkedIn to build rapport on both channels","Continue the conversation on Instagram only — do not move channels without TL approval","Send them a LinkedIn connection request and move the conversation there","Email them a formal proposal to look more professional"],
    ans: 1,
    fb: "Continue on Instagram where the conversation started. Moving to a second active channel without Team Leader approval is a cross-channel violation — even when the prospect is responsive. Get TL sign-off first if you believe LinkedIn would serve the deal better." },

  { q: "What is the minimum passing score on the Instagram QA scorecard?",
    opts: ["60 out of 100","65 out of 100","70 out of 100","80 out of 100"],
    ans: 2,
    fb: "The minimum passing score is 70 out of 100 — the same across all three outreach channels. With Message Quality and Personalization worth 25 points alone, a well-personalised, compliant DM gets you most of the way there." }
];

let current = 0, score = 0, answered = [];
const letters = ['A','B','C','D'];

function render() {
  const area = document.getElementById('quiz-area');
  const prog = document.getElementById('prog');
  if (current >= Qs.length) { showScore(); return; }
  prog.style.width = (current / Qs.length * 100) + '%';
  const q = Qs[current];
  area.innerHTML = `
    <div class="q-num">Question ${current + 1} of ${Qs.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="opts">
      ${q.opts.map((o,i) => `
        <div class="opt" id="opt${i}" onclick="choose(${i})">
          <div class="opt-letter">${letters[i]}</div>
          <div class="opt-text">${o}</div>
        </div>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="qa-btn primary" id="next-btn" style="display:none" onclick="next()">
      ${current < Qs.length - 1 ? 'Next question <i class="ti ti-arrow-right" aria-hidden="true"></i>' : 'See my results <i class="ti ti-arrow-right" aria-hidden="true"></i>'}
    </button>`;
}

function choose(i) {
  const q = Qs[current];
  document.querySelectorAll('.opt').forEach(o => o.classList.add('locked'));
  const fb = document.getElementById('fb');
  const nbtn = document.getElementById('next-btn');
  if (i === q.ans) {
    score++; answered.push(true);
    document.getElementById('opt'+i).classList.add('correct');
    document.querySelectorAll('.opt').forEach((o,idx) => { if (idx !== i) o.classList.add('dimmed'); });
    fb.className = 'feedback show ok';
    fb.innerHTML = '<strong><i class="ti ti-check" aria-hidden="true"></i> Correct.</strong> ' + q.fb;
  } else {
    answered.push(false);
    document.getElementById('opt'+i).classList.add('wrong');
    document.getElementById('opt'+q.ans).classList.add('correct');
    document.querySelectorAll('.opt').forEach((o,idx) => { if (idx !== i && idx !== q.ans) o.classList.add('dimmed'); });
    fb.className = 'feedback show bad';
    fb.innerHTML = '<strong><i class="ti ti-x" aria-hidden="true"></i> Incorrect.</strong> ' + q.fb;
  }
  nbtn.style.display = 'inline-flex';
}

function next() { current++; render(); }

function showScore() {
  document.getElementById('prog').style.width = '100%';
  const pass = score >= 11;
  const pct = Math.round(score / Qs.length * 100);
  const area = document.getElementById('quiz-area');
  const reviewItems = Qs.map((q, i) => `
    <div class="rev-item ${answered[i] ? 'rpass' : 'rfail'}">
      <span class="rev-icon"><i class="ti ${answered[i] ? 'ti-check' : 'ti-x'}" aria-hidden="true"></i></span>
      <span>Q${i+1}: ${q.q.length > 70 ? q.q.slice(0,70)+'…' : q.q}</span>
    </div>`).join('');
  area.innerHTML = `
    <div class="score-wrap">
      <div class="score-circle ${pass ? 'pass' : 'fail'}">
        <div class="score-num" style="color:${pass ? 'var(--color-text-success)' : 'var(--color-text-danger)'}">${score}/${Qs.length}</div>
        <div class="score-denom">${pct}%</div>
      </div>
      <div class="score-label" style="color:${pass ? 'var(--color-text-success)' : 'var(--color-text-danger)'}">
        ${pass ? '<i class="ti ti-trophy" aria-hidden="true"></i> Passed' : '<i class="ti ti-refresh" aria-hidden="true"></i> Not yet'}
      </div>
      <div class="score-sub">${pass
        ? 'You\'ve demonstrated solid knowledge of Instagram Outreach Standards. Well done.'
        : 'You need 11/15 (70%) to pass. Review the video and try again — pay close attention to word count, profile research, and CTA rules.'
      }</div>
      <div class="review-list">${reviewItems}</div>
      <button class="qa-btn primary" onclick="restart()">
        <i class="ti ti-refresh" aria-hidden="true"></i> Retake assessment
      </button>
    </div>`;
}

function restart() { current = 0; score = 0; answered = []; document.getElementById('prog').style.width = '0%'; render(); }
render();
</script>
